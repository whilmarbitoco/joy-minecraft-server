version: "3.8"

services:
  bedrock:
    image: itzg/minecraft-bedrock-server:latest
    container_name: bedrock-server
    restart: unless-stopped

    ports:
      - "19132:19132/udp"

    environment:
      EULA: "TRUE"

      SERVER_NAME: "Joy Minecraft"
      GAMEMODE: "survival"
      DIFFICULTY: "normal"
      MAX_PLAYERS: "10"
      ONLINE_MODE: "true"

      LEVEL_NAME: "world"
      LEVEL_SEED: "888880777356331877"

      VIEW_DISTANCE: "16"
      TICK_DISTANCE: "4"
      ALLOW_CHEATS: "false"

      TZ: "Asia/Manila"

    volumes:
      - ./data:/data
      - ./packs:/packs:ro
      - ./entrypoint.sh:/entrypoint.sh:ro

    entrypoint: ["/bin/bash", "/entrypoint.sh"]
